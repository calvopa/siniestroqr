version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: siniestroqr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: siniestroqr
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: siniestroqr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siniestroqr"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siniestroqr_app
    restart: unless-stopped
    ports:
      - "3101:3000"
    environment:
      DATABASE_URL: postgresql://siniestroqr:secret@postgres:5432/siniestroqr
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PHOTO_SIGNING_SECRET: ${PHOTO_SIGNING_SECRET}
      PHOTOS_DIR: /data/photos
      NODE_ENV: production
    volumes:
      - photos_data:/data/photos
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  photos_data:
    driver: local
